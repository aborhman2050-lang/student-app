<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل التميز | أقسام المادة</title>
<link rel="stylesheet" href="assets/fontawesome/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',Tahoma,sans-serif;
background:linear-gradient(135deg,#f0fdf4 0%,#ecfdf5 50%,#f8fafc 100%);
color:#14532d;
direction:rtl;
line-height:1.6;
}
/* ============================= */
/* ===== شريط العنوان الجديد ===== */
/* ============================= */

.top-bar{
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    height: 80px;
    background: linear-gradient(135deg,#16a34a,#22c55e);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 1000;
}

/* عنوان الوسط */
.top-bar::after{
    content: "دليل التميز";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    font-weight: bold;
    color: white;
}

/* إلغاء خلفية navbar القديمة */
.navbar{
    display:none;
}

/* ضبط الجسم تحت الشريط */
body{
    padding-top: 100px;
}

/* ===== Navbar ===== */
.navbar{
background:white;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
padding:1rem 0;
position:sticky;
top:0;
z-index:100;
border-bottom:4px solid #22c55e;
}

.navbar-container{
max-width:1200px;
margin:0 auto;
padding:0 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.btn-back{
background:transparent;
color:#166534;
border:none;
padding:8px 16px;
cursor:pointer;
display:flex;
align-items:center;
gap:8px;
font-weight:600;
transition:0.3s;
}

.btn-back:hover{
background:#f0fdf4;
border-radius:8px;
}

.navbar-title{
display:flex;
align-items:center;
gap:10px;
font-size:1.25rem;
font-weight:700;
color:#166534;
}

/* ===== Container ===== */
.subject-detail-container{
max-width:1200px;
margin:0 auto;
padding:40px 20px;
}

.subject-info{
text-align:center;
margin-bottom:50px;
}

/* ===== البطاقة العلوية ===== */
.info-card{
border-radius:25px;
padding:40px;
color:white;
box-shadow:0 15px 35px rgba(34,197,94,0.25);
}

.info-icon{
width:100px;
height:100px;
background:rgba(255,255,255,0.2);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 20px;
font-size:3rem;
}

.info-card h1{
color:white;
margin-bottom:10px;
font-size:2.5rem;
}

.info-card p{
color:rgba(255,255,255,0.95);
font-size:1.1rem;
}

/* ===== البطاقات ===== */
.options-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
margin-bottom:50px;
}

.option-card{
background:white;
border-radius:20px;
padding:30px;
text-align:center;
cursor:pointer;
transition:0.4s;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
border:2px solid transparent;
}

.option-card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(34,197,94,0.25);
}

.option-card i{
font-size:2.5rem;
margin-bottom:15px;
display:block;
color:#16a34a;
}

.option-card h3{
margin-bottom:8px;
color:#166534;
font-weight:700;
}

.option-card p{
color:#15803d;
font-size:0.9rem;
}

/* ===== Footer ===== */
.footer{
background:linear-gradient(135deg,#14532d,#166534);
color:#d1fae5;
text-align:center;
padding:2rem;
margin-top:4rem;
}
</style>
</head>

<body>

<nav class="navbar">
<div class="navbar-container">
<button class="btn-back" onclick="goBack()">

</button>

<div class="navbar-title">
<i id="subjectIcon" class="fas fa-pen-nib"></i>
<span id="subjectTitle">اللغة العربية</span>
</div>

<div></div>
</div>
</nav>

<div class="subject-detail-container">

<section class="subject-info">
<div class="info-card" id="infoCard">
<div class="info-icon">
<i id="subjectIconLarge" class="fas fa-pen-nib"></i>
</div>
<h1>أقسام المادة</h1>
<p>اختر القسم الذي تريد تصفحه</p>
</div>
</section>

<section>
<div class="options-grid" id="optionsGrid">

<div class="option-card" onclick="openBook('reading.pdf')">
<i class="fas fa-book-open"></i>
<h3>القراءة</h3>
<p>عرض كتاب القراءة</p>
</div>

<div class="option-card" onclick="openBook('nahw.pdf')">
<i class="fas fa-language"></i>
<h3>النحو والصرف</h3>
<p>عرض كتاب النحو والصرف</p>
</div>

<div class="option-card" onclick="openBook('literature.pdf')">
<i class="fas fa-feather-alt"></i>
<h3>الأدب والنصوص</h3>
<p>عرض كتاب الأدب والنصوص</p>
</div>

</div>
</section>

</div>

<footer class="footer">
<p>&copy; 2026 دليل التميز. جميع الحقوق محفوظة.</p>
</footer>

<script>

/* نفس نظام الألوان الموجود في subject-detail */

const subjectsData = {
arabic:{ title:'اللغة العربية',icon:'fa-pen-nib',color:'#16a34a'}
};

const sub = subjectsData["arabic"];

document.getElementById('subjectTitle').textContent=sub.title;
document.getElementById('subjectIcon').className=`fas ${sub.icon}`;
document.getElementById('subjectIconLarge').className=`fas ${sub.icon}`;

function adjustBrightness(color, percent){
const num=parseInt(color.replace('#',''),16);
const amt=Math.round(2.55*percent);
const R=(num>>16)+amt;
const G=(num>>8 & 0x00FF)+amt;
const B=(num & 0x0000FF)+amt;
return "#"+(0x1000000+
(R<255?(R<1?0:R):255)*0x10000+
(G<255?(G<1?0:G):255)*0x100+
(B<255?(B<1?0:B):255)
).toString(16).slice(1);
}

/* تطبيق نفس التدرج */
document.getElementById("infoCard").style.background =
`linear-gradient(135deg, ${sub.color}, ${adjustBrightness(sub.color,20)})`;

/* لون الأيقونات وحدود الهوفر */
document.querySelectorAll(".option-card i").forEach(icon=>{
icon.style.color=sub.color;
});

document.querySelectorAll(".option-card").forEach(card=>{
card.addEventListener("mouseover",()=>card.style.borderColor=sub.color);
card.addEventListener("mouseout",()=>card.style.borderColor="transparent");
});

function openBook(file){
window.location.href="pdfs/arabic/"+file;
}

function goBack(){
window.location.href="subject-detail.html";
}

</script>
<script src="layout.js"></script>
</body>
</html>
