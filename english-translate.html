<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مترجم الإنجليزية</title>
<link rel="stylesheet" href="assets/fontawesome/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',Tahoma,sans-serif;
background:linear-gradient(135deg,#f0fdf4 0%,#ecfdf5 50%,#f8fafc 100%);
direction:rtl;
color:#14532d;
}

/* ===== Navbar ===== */
.navbar{
background:white;
padding:15px 20px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:4px solid #22c55e;
}

.navbar h2{
color:#166534;
font-weight:700;
}

.navbar button{
background:transparent;
color:#166534;
border:none;
font-weight:600;
cursor:pointer;
padding:8px 15px;
transition:0.3s;
}

.navbar button:hover{
background:#f0fdf4;
border-radius:8px;
}

/* ===== Container ===== */
.container{
max-width:900px;
margin:50px auto;
padding:20px;
}

/* ===== Textarea ===== */
textarea{
width:100%;
height:160px;
padding:15px;
border-radius:15px;
border:1px solid rgba(34,197,94,0.3);
margin-bottom:20px;
font-size:15px;
background:white;
box-shadow:0 8px 20px rgba(34,197,94,0.1);
resize:none;
}

/* ===== Button ===== */
button{
background:linear-gradient(135deg,#16a34a,#22c55e);
color:white;
padding:12px 25px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:15px;
transition:0.3s;
box-shadow:0 8px 20px rgba(34,197,94,0.3);
}

button:hover{
transform:translateY(-3px);
box-shadow:0 12px 25px rgba(34,197,94,0.4);
}

/* ===== Result ===== */
.result{
margin-top:25px;
background:white;
padding:25px;
border-radius:20px;
min-height:120px;
box-shadow:0 12px 30px rgba(34,197,94,0.15);
border:1px solid rgba(34,197,94,0.2);
color:#14532d;
}

/* ===== Footer ===== */
.footer{
background:linear-gradient(135deg,#14532d,#166534);
color:#d1fae5;
text-align:center;
padding:2rem;
margin-top:4rem;
font-size:14px;
}
top-bar{
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    height: 80px;
    background: linear-gradient(135deg,#16a34a,#22c55e);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 1000;
}

/* عنوان الوسط */
.top-bar::after{
    content: "أكاديمية التميز";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    font-weight: bold;
    color: white;
}

/* إلغاء خلفية navbar القديمة */
.navbar{
    display:none;
}

/* ضبط الجسم تحت الشريط */
body{
    padding-top: 100px;
}

.translation-header{
    max-width:900px;
    margin:30px auto 10px;
    text-align:center;
    padding:25px;
    background:linear-gradient(135deg,#16a34a,#22c55e);
    border-radius:20px;
    color:white;
    box-shadow:0 15px 35px rgba(34,197,94,0.3);
}

.translation-header i{
    font-size:35px;
    margin-bottom:10px;
    display:block;
}

.translation-header h1{
    font-size:26px;
    margin-bottom:8px;
}

.translation-header p{
    font-size:14px;
    opacity:0.9;
}
</style>
</head>

<body>

<section class="translation-header">
    <i class="fas fa-language"></i>
    <h1>مترجم اللغة الإنجليزية</h1>
    <p>اكتب الكلمة أو الجملة بالإنجليزية لترجمتها إلى العربية فوراً</p>
</section>
<div class="container">
<textarea id="inputText" placeholder="اكتب النص الإنجليزي هنا..."></textarea>
<button onclick="translateText()">ترجمة</button>
<div class="result" id="resultBox"></div>
</div>

<footer class="footer">
<p>&copy; 2026 دليل التميز. جميع الحقوق محفوظة.</p>
</footer>

<script>

async function translateText(){
    const text = document.getElementById("inputText").value.trim();
    const resultBox = document.getElementById("resultBox");

    if(!text){
        resultBox.innerHTML = "يرجى كتابة نص أولاً";
        return;
    }

    resultBox.innerHTML = "جاري الترجمة...";

    try{
        const response = await fetch(
            "https://api.mymemory.translated.net/get?q=" 
            + encodeURIComponent(text) + "&langpair=en|ar"
        );

        const data = await response.json();
        resultBox.innerHTML = data.responseData.translatedText;

    }catch(error){
        resultBox.innerHTML = "حدث خطأ أثناء الترجمة";
    }
}

function goBack(){
    window.location.href='subject-detail.html';
}

function goBack(){
    window.location.href='subject-detail.html';
}

</script>
<script src="layout.js"></script>
</body>
</html>
