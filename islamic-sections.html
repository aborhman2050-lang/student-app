<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل التميز | أقسام التربية الإسلامية</title>
<link rel="stylesheet" href="assets/fontawesome/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,sans-serif;background-color:#f5f7fa;color:#2b2d42;direction:rtl;line-height:1.6;}

/* ============================= */
/* ===== شريط العنوان الجديد ===== */
/* ============================= */

.top-bar{
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    height: 80px;
    background: linear-gradient(135deg,#16a34a,#22c55e);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 1000;
}

/* عنوان الوسط */
.top-bar::after{
    content: "دليل التميز";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    font-weight: bold;
    color: white;
}

/* إلغاء خلفية navbar القديمة */
.navbar{
    display:none;
}

/* ضبط الجسم تحت الشريط */
body{
    padding-top: 100px;
}
.navbar{background:white;box-shadow:0 4px 15px rgba(0,0,0,0.1);padding:1rem 0;position:sticky;top:0;z-index:100;}
.navbar-container{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center;}
.btn-back{background:transparent;color:#4361ee;border:none;padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:600;}
.btn-back:hover{background:#f8f9fa;border-radius:8px;}

.navbar-title{display:flex;align-items:center;gap:10px;font-size:1.25rem;font-weight:600;color#42CB64:#48D944;}

.subject-detail-container{max-width:1200px;margin:0 auto;padding:40px 20px;}

.subject-info{text-align:center;margin-bottom:50px;}
.info-card{background:linear-gradient(135deg,#46C152,#33C448);border-radius:20px;padding:40px;color:white;box-shadow:0 10px 30px rgba(0,0,0,0.15);}
.info-icon{width:100px;height:100px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:3rem;}
.info-card h1{color:white;margin-bottom:10px;font-size:2.5rem;}
.info-card p{color:rgba(255,255,255,0.9);font-size:1.1rem;}

.options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:50px;}

.option-card{background:white;border-radius:15px;padding:25px;text-align:center;cursor:pointer;transition:0.3s;box-shadow:0 4px 15px rgba(0,0,0,0.1);border:2px solid transparent;}
.option-card:hover{transform:translateY(-8px);box-shadow:0 10px 30px rgba(0,0,0,0.15);border-color:#14532D;}
.option-card i{font-size:2.5rem;color:#36901C;margin-bottom:15px;display:block;}
.option-card h3{margin-bottom:8px;}
.option-card p{color:#8d99ae;font-size:0.9rem;}

.footer{
background:linear-gradient(135deg,#14532D,#166534);
color:#d1fae5;
text-align:center;
padding:2rem;
margin-top:4rem;
}
</style>
</head>

<body>

<nav class="navbar">
<div class="navbar-container">
<button class="btn-back" onclick="goBack()">

</button>
<div class="navbar-title">
<i class="fas fa-mosque"></i>
<span>التربية الإسلامية</span>
</div>
<div></div>
</div>
</nav>

<div class="subject-detail-container">

<section class="subject-info">
<div class="info-card">
<div class="info-icon">
<i class="fas fa-mosque"></i>
</div>
<h1>أقسام المادة</h1>
<p>اختر القسم الذي تريد تصفحه</p>
</div>
</section>

<section>
<div class="options-grid">

<div class="option-card" onclick="openBook('iman.pdf')">
<i class="fas fa-star"></i>
<h3>الإيمان</h3>
<p>عرض كتاب الإيمان</p>
</div>



<div class="option-card" onclick="openBook('hadith.pdf')">
<i class="fas fa-scroll"></i>
<h3>  الحديث</h3>
<p>عرض كتاب الحديث</p>
</div>

<div class="option-card" onclick="openBook('seerah.pdf')">
<i class="fas fa-mosque"></i>
<h3>السيرة</h3>
<p>عرض كتاب السيرة</p>
</div>
<div class="option-card" onclick="openBook('fiqh.pdf')">
<i class="fas fa-mosque"></i>
<h3>الفقة</h3>
<p>عرض كتاب الفقة</p>
</div>

</div>
</section>

</div>

<footer class="footer">
<p>&copy; 2026 دليل التميز. جميع الحقوق محفوظة.</p>
</footer>

<script>
function openBook(file){
window.location.href="pdfs/islamic/"+file;
}

function goBack(){
window.location.href="subject-detail.html";
}
</script>
<script src="layout.js"></script>
</body>
</html>
