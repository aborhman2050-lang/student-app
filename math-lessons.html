            font-size: 19px;
            font-weight: bold;

            align-items: center;

            border: none;
            padding: 8px 18px;
            border-radius: 15px;
            font-size: 14px;

            transition: 0.3s;
        }

        .container {
            padding: 10px 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* مربع البحث */
        .search-box {
            margin-bottom: 20px;
        }

            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            outline: none;
            font-size: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            box-sizing: border-box;
        }

        /* تصميم البطاقة (نفس صور الفيزياء والرياضيات بالضبط) */
        .lesson-card {
            background-color: white;
            border-radius: 25px;
            padding: 25px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 6px solid #16a34a; /* الخط الأخضر العلوي المميز */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lesson-title {
            color: #14532d;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
        }

        /* الزر الأحمر العريض مع أيقونة يوتيوب */
        .btn-watch {
            background: #ef4444; /* اللون الأحمر من الصورة */
            color: white;
            text-decoration: none;
            width: 100%;
            padding: 14px 0;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-watch:active { transform: scale(0.98); }

        .btn-watch i {
            font-size: 22px;
        }

        /* شريط حقوق الملكية (الذي طلبته) */
        .footer-strip {
            background-color: #064e3b; /* أخضر غامق جداً مثل صورك */
            color: #ecfdf5;
            text-align: center;
            padding: 25px 10px;
            margin-top: 40px;
            font-size: 14px;
        }

text-align:center;
display:inline-block;

function displayLessons(data) {
    const list = document.getElementById("lessonsList");
    list.innerHTML = data.map(lesson => `
        <div class="lesson-card">
            <div class="lesson-title">${lesson.title}</div>
            <a href="${lesson.link}" class="btn-watch" target="_blank">
                 مشاهدة الدرس <i class="fab fa-youtube"></i>
            </a>
        </div>
    `).join('');
}

function filterLessons() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    const filtered = lessons.filter(l => l.title.toLowerCase().includes(term));
    displayLessons(filtered);
}

// البدء عند تحميل الصفحة
displayLessons(lessons);
