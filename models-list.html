<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الطالب الذكي | النماذج التدريبية</title>
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <style>
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
}

body { 
    font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f8fafc 100%);
    color: #14532d; 
    direction: rtl; 
}

/* ===== Navbar ===== */
.navbar { 
    background: linear-gradient(135deg, #16a34a, #22c55e);
    box-shadow: 0 8px 25px rgba(22, 163, 74, 0.25); 
    padding: 1rem 0; 
    position: sticky; 
    top: 0; 
    z-index: 100; 
}

.navbar-container { 
    max-width: 1200px; 
    margin: 0 auto; 
    padding: 0 20px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
}

.btn-back { 
    background: rgba(255,255,255,0.15); 
    color: white; 
    border: none; 
    padding: 8px 16px; 
    cursor: pointer; 
    transition: all 0.3s ease; 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    font-weight: 600; 
    border-radius: 10px;
}

.btn-back:hover { 
    background: rgba(255,255,255,0.25); 
}

.navbar-title { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    font-size: 1.25rem; 
    font-weight: 700; 
    color: white; 
}

/* ===== المحتوى ===== */
.models-container { 
    max-width: 1200px; 
    margin: 40px auto; 
    padding: 0 20px; 
    text-align: center; 
}

/* ===== شبكة النماذج ===== */
.models-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
    gap: 20px; 
    margin-top: 30px; 
}

/* ===== بطاقة النموذج ===== */
.model-card { 
    background: white; 
    border-radius: 15px; 
    padding: 25px; 
    text-align: center; 
    cursor: pointer; 
    transition: all 0.3s ease; 
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08); 
    border: 2px solid transparent; 
    font-size: 1.5rem; 
    font-weight: 700; 
    color: #166534; 
}

.model-card:hover { 
    transform: translateY(-8px); 
    box-shadow: 0 12px 25px rgba(34, 197, 94, 0.25); 
    border-color: #22c55e; 
    background: linear-gradient(135deg, #16a34a, #22c55e); 
    color: white; 
}
.footer {
    background: linear-gradient(135deg, #14532d, #166534);
    color: #d1fae5;
    text-align: center;
    padding: 2rem;
    margin-top: 4rem;
}
top-bar{
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    height: 80px;
    background: linear-gradient(135deg,#16a34a,#22c55e);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 1000;
}

/* عنوان الوسط */
.top-bar::after{
    content: "أكاديمية التميز";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    font-weight: bold;
    color: white;
}

/* إلغاء خلفية navbar القديمة */
.navbar{
    display:none;
}

/* ضبط الجسم تحت الشريط */
body{
    padding-top: 100px;
}

    </style>
</head>
<body>
    <nav class="navbar"><div class="navbar-container"><button class="btn-back" onclick="goBack()"><i class="fas fa-arrow-right"></i> </button><div class="navbar-title"><i class="fas fa-copy"></i> <span id="subjectTitle">النماذج التدريبية</span></div><div></div></div></nav>
    <div class="models-container">
        <h1 id="mainTitle">النماذج التدريبية</h1>
        <div class="models-grid" id="modelsGrid"></div>
    </div>
    <footer class="footer">
<p>&copy; 2026 أكاديمية التميز. جميع الحقوق محفوظة.</p>
</footer>
    <script>
        const currentSubject = localStorage.getItem('modelSubject') || 'quran';

const subjectsNames = { 
    quran: 'القرآن الكريم', 
    math: 'الرياضيات', 
    islamic: 'التربية الإسلامية', 
    arabic: 'اللغة العربية', 
    english: 'اللغة الإنجليزية', 
    chemistry: 'الكيمياء', 
    biology: 'الأحياء', 
    physics: 'الفيزياء' 
};

const modelsCounts = { 
    quran: 10, 
    math: 10, 
    islamic: 10, 
    arabic: 10, 
    english: 10, 
    chemistry: 10, 
    biology: 10, 
    physics: 10 
};

function init() {

    document.getElementById('mainTitle').textContent = 
        `نماذج مادة ${subjectsNames[currentSubject]}`;

    const grid = document.getElementById('modelsGrid');
    const count = modelsCounts[currentSubject] || 10;

    for (let i = 1; i <= count; i++) {

        const card = document.createElement('div');
        card.className = 'model-card';
        card.textContent = i;

        card.onclick = () => {
            window.location.href = `pdfs/${currentSubject}/model${i}.pdf`;
        };

        grid.appendChild(card);
    }
}


function goBack() { 
    window.location.href = 'subject-detail.html'; 
}

init();
    </script>
    <script src="layout.js"></script>
</body>
</html>
