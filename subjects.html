const subjectsData={
quran:{title:'القرآن الكريم',icon:'fa-quran',description:'تلاوة وتفسير وأحكام التجويد'},

islamic:{title:'التربية الإسلامية',icon:'fa-mosque',description:'العقيدة والفقه والسيرة'},
arabic:{title:'اللغة العربية',icon:'fa-pen-nib',description:'النحو والبلاغة والأدب'},
english:{title:'اللغة الإنجليزية',icon:'fa-language',description:'Grammar and Vocabulary'},
math:{title:'الرياضيات',icon:'fa-calculator',description:'التفاضل والتكامل والجبر'},
chemistry:{title:'الكيمياء',icon:'fa-vial',description:'الكيمياء العضوية والتحليلية'},
biology:{title:'الأحياء',icon:'fa-dna',description:'الوراثة والخلية'},
physics:{title:'الفيزياء',icon:'fa-bolt',description:'الكهرباء والضوء'}
};

function initializeSubjects() {

    const grid = document.getElementById('subjectsGrid');
    grid.innerHTML = "";

    const isTrial = localStorage.getItem("isTrialMode") === "true";

    for (const key in subjectsData) {

        if (isTrial && key !== "quran") continue;

        const sub = subjectsData[key];

        const card = document.createElement('div');
        card.className = 'subject-card';

        card.innerHTML = `
            <i class="fas ${sub.icon}"></i>
            <h3>${sub.title}</h3>
            <p>${sub.description}</p>
        `;

        card.onclick = () => {
            localStorage.setItem('currentSubject', key);
            window.location.href = 'subject-detail.html';
        };

        grid.appendChild(card);
    }

    if(isTrial){
        const notice = document.createElement("div");
        notice.style.textAlign = "center";
        notice.style.marginTop = "20px";
        notice.style.fontWeight = "bold";
        notice.style.color = "#dc3545";
        notice.innerText = "أنت تستخدم النسخة التجريبية - متاح مادة القرآن فقط";
        grid.parentElement.appendChild(notice);
    }
}

function goToPlanner(){

}

}

initializeSubjects();

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getFirestore, 
  doc, 
  getDoc, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* ================= Firebase ================= */

const firebaseConfig = {
  apiKey: "AIzaSyCzQ3CAwzIS41TuWsbhomTdsdDzJGH3bmU",
  authDomain: "studentapp-97888.firebaseapp.com",
  projectId: "studentapp-97888",
  storageBucket: "studentapp-97888.appspot.com",
  messagingSenderId: "654721058804",
  appId: "1:654721058804:web:db251bb134e8abd73fdba1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= فحص الوضع المجاني ================= */

async function checkFreeMode(){

  try{
    const snap = await getDoc(doc(db,"appSettings","config"));
    if(!snap.exists()) return;

    const data = snap.data();

    if(data.isAppFree === true){

      if(!data.freeUntil){
        return; // مجاني مفتوح
      }

      const now = new Date();
      const freeUntil = data.freeUntil.toDate();

      if(now <= freeUntil){
        return; // ما زال مجاني
      }

    }

  }catch(e){
    console.log("Free mode check error:",e);
  }
}

await checkFreeMode();

/* ================= حماية بالمفتاح ================= */

const userKey = localStorage.getItem("userKey");

if (!userKey) {

    // إذا ليس مجاني وليس لديه مفتاح
    const snap = await getDoc(doc(db,"appSettings","config"));
    const data = snap.exists() ? snap.data() : null;

    if(!data || data.isAppFree !== true){
        window.location.href = "login.html";
    }

} else {

    // مراقبة المفتاح في الوقت الحقيقي
    onSnapshot(doc(db, "activationKeys", userKey), (docSnap) => {

        if (!docSnap.exists() || docSnap.data().disabled === true) {

            alert("تم إيقاف اشتراكك أو انتهت صلاحية المفتاح 🔒");

            localStorage.removeItem("subscriptionActive");
            localStorage.removeItem("userKey");

            window.location.href = "login.html";
        }

    });

}

/* ================= فحص دوري احتياطي ================= */

async function liveSecurityCheck(){

  const key = localStorage.getItem("userKey");
  if(!key) return;

  try{

    const snap = await getDoc(doc(db,"activationKeys",key));
    if(!snap.exists()) return;

    const data = snap.data();

    if(data.disabled === true){

      localStorage.clear();

      alert("تم إيقاف اشتراكك من الإدارة ❌");

      window.location.href="login.html";
    }

  }catch(e){
    console.log("Offline - skip live check");
  }
}

liveSecurityCheck();
setInterval(liveSecurityCheck, 60 * 1000);

</script>
