<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاختبارات</title>
<link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
<script src="questions.js"></script>

<style>

/* ===== إعداد عام مطابق لتفاصيل المادة ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',Tahoma,Verdana,sans-serif;
background:linear-gradient(135deg,#f0fdf4 0%,#ecfdf5 50%,#f8fafc 100%);
color:#14532d;
direction:rtl;
line-height:1.6;
}

/* ===== Navbar نفس الصفحة السابقة ===== */
.navbar{
background:white;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
padding:1rem 0;
position:sticky;
top:0;
z-index:100;
border-bottom:4px solid #22c55e;
}

.navbar-container{
max-width:1200px;
margin:auto;
padding:0 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.btn-back{
background:transparent;
color:#166534;
border:none;
padding:8px 16px;
cursor:pointer;
font-weight:600;
display:flex;
align-items:center;
gap:8px;
}

.btn-back:hover{
background:#f0fdf4;
border-radius:8px;
}

.navbar-title{
display:flex;
align-items:center;
gap:10px;
font-size:1.3rem;
font-weight:700;
color:#166534;
}

/* ===== المحتوى ===== */
.tests-container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* عنوان داخل إطار مطابق للصفحات */
.page-title{
text-align:center;
display:inline-block;
padding:14px 40px;
border-radius:20px;
margin:0 auto 50px auto;
font-size:28px;
font-weight:700;

background:linear-gradient(white,white) padding-box,
linear-gradient(135deg,#16a34a,#22c55e) border-box;

border:3px solid transparent;
box-shadow:0 10px 25px rgba(34,197,94,0.25);
color:#166534;
}

/* شبكة الاختبارات */
.tests-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* بطاقة نفس ستايل option-card */
.test-card{
background:white;
border-radius:20px;
padding:25px;
text-align:center;
cursor:pointer;
transition:0.4s;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
border:2px solid transparent;
}

.test-card:hover{
transform:translateY(-10px);
border-color:#22c55e;
box-shadow:0 20px 40px rgba(34,197,94,0.25);
}

.test-title{
font-size:20px;
margin-bottom:10px;
font-weight:700;
color:#166534;
}

.test-info{
font-size:14px;
color:#15803d;
margin-bottom:20px;
}
/* ============================= */
/* ===== شريط العنوان الجديد ===== */
/* ============================= */

.top-bar{
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    height: 80px;
    background: linear-gradient(135deg,#16a34a,#22c55e);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 1000;
}

/* عنوان الوسط */
.top-bar::after{
    content: "أكاديمية التميز";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    font-weight: bold;
    color: white;
}

/* إلغاء خلفية navbar القديمة */
.navbar{
    display:none;
}

/* ضبط الجسم تحت الشريط */
body{
    padding-top: 100px;
}
/* زر البدء مطابق للأخضر */
.start-btn{
background:linear-gradient(135deg,#16a34a,#22c55e);
color:white;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
transition:0.3s;
}

.test-card:hover .start-btn{
background:linear-gradient(135deg,#14532d,#166534);
}
.footer{
margin-top:60px;
background:linear-gradient(135deg,#14532d,#166534);
color:#d1fae5;
text-align:center;
padding:2rem;
font-weight:600;
}

</style>
</head>

<body>

<!-- ===== Navbar مطابق ===== -->
<nav class="navbar">
<div class="navbar-container">
<button class="btn-back" onclick="goBack()">→ العودة</button>
<div class="navbar-title">
📚 الاختبارات
</div>
</div>
</nav>

<div class="tests-container">

<div style="text-align:center;">
<h2 class="page-title">اختر الاختبار</h2>
</div>

<div class="tests-grid" id="testsContainer"></div>

</div>

<<script>

function goBack(){
    window.location.href="subject-detail.html";
}

/* جلب المادة المختارة */

const currentSubject = localStorage.getItem("testSubject");

/* التأكد من وجود المادة */

if(!currentSubject){
  alert("لم يتم اختيار مادة");
  window.location.href="subjects.html";
}

/* التأكد أن بنك الأسئلة موجود */

if(typeof QUESTION_BANK === "undefined"){
  alert("لم يتم تحميل بنك الأسئلة");
}

/* التأكد أن المادة موجودة */

if(!QUESTION_BANK[currentSubject]){
  alert("المادة غير موجودة");
  window.location.href="subjects.html";
}

/* جلب الاختبارات الخاصة بالمادة */

const tests = QUESTION_BANK[currentSubject].tests;

/* التأكد من وجود اختبارات */

if(!tests || tests.length === 0){
  alert("لا توجد اختبارات لهذه المادة");
  window.location.href="subjects.html";
}

/* مكان عرض الاختبارات */

const container = document.getElementById("testsContainer");

if(!container){
console.error("testsContainer غير موجود");
}

/* إنشاء بطاقات الاختبارات */

tests.forEach((test,index)=>{

const card=document.createElement("div");
card.className="test-card";

card.innerHTML=`
<div class="test-title">${test.title}</div>

<div class="test-info">
عدد الأسئلة: ${test.questions.length}
</div>

<div class="start-btn">
بدء الاختبار
</div>
`;

card.onclick=()=>{

localStorage.setItem("selectedTest",index);

window.location.href="lest-view.html";

};

container.appendChild(card);

});

</script><footer class="footer">
&copy; 2026 دليل التميز | جميع الحقوق محفوظة
</footer>
<script src="layout.js"></script>
</body>
</html>
